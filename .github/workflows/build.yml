name: Build and Publish

on:
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  build:
    name: Build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDKs
        uses: actions/setup-java@v4
        with:
          java-version: |
            21
            25
          distribution: 'microsoft'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build all versions
        run: ./gradlew build

      - name: Upload JARs
        uses: actions/upload-artifact@v4
        with:
          name: jars
          path: |
            versions/*/build/libs/*.jar
            !versions/*/build/libs/*-dev.jar
            !versions/*/build/libs/*-sources.jar
          if-no-files-found: error

  publish:
    name: Publish to Modrinth
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDKs
        uses: actions/setup-java@v4
        with:
          java-version: |
            21
            25
          distribution: 'microsoft'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # Only lists versions not yet published to Modrinth. `./gradlew modrinth` would
      # re-upload every subproject, which fails on versions already published under
      # the same version number. Add newly-added versions here as they're released.
      - name: Build and publish to Modrinth
        run: ./gradlew :26.1:modrinth :26.1.1:modrinth :26.1.2:modrinth :26.2:modrinth
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
